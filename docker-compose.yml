services:
  db:
    image: postgres:16-alpine
    container_name: schedule-db
    environment:
      POSTGRES_DB: schedule_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      TZ: Europe/Kyiv
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: schedule-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: schedule_db
      DB_USER: postgres
      DB_PASSWORD: password
      TZ: Europe/Kyiv
    ports:
      - "8080:8080"
    restart: always

  frontend:
    build: ./frontend
    container_name: schedule-frontend
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      TZ: Europe/Kyiv
    ports:
      - "3000:3000"
    restart: always

volumes:
  postgres_data:
